spring.application.name=resumen-compra-consumer
server.port=8081

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

app.rabbitmq.exchange=resumenInscripcionExchange
app.rabbitmq.queue=resumenInscripcionQueue
app.rabbitmq.routingkey=resumenInscripcion.routingkey

# --- TEMPORAL: H2 para prueba rápida (reemplazar por Oracle Cloud después) ---
spring.datasource.url=jdbc:h2:mem:resumencompra
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

